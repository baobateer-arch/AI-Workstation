# AI Workstation Auto Refresh Configuration

[server]
# 服务器地址（PC端IP）
url = http://192.168.31.138:8765/dashboard.png

[refresh]
# 刷新间隔（秒）
interval = 60

# 重试间隔（网络失败时，秒）
retry_interval = 30

[pixel]
# fbink 刷新模式
# 1 = 局部刷新（推荐，减少闪烁）
# 2 = 全局刷新
mode = 1

[paths]
# 图片下载路径
target = /mnt/us/dashboard_kindle.png

# 临时文件路径
temp = /tmp/dashboard.png

# 日志文件路径
log = /mnt/us/extensions/AIWorkstation/refresh.log

# PID 文件路径
pid = /mnt/us/extensions/AIWorkstation/refresh.pid
